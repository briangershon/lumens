name: Release Packages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect pending changesets
        id: changesets
        shell: bash
        run: |
          if find .changeset -maxdepth 1 -type f -name '*.md' | grep -q .; then
            echo "has_changesets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changesets=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup pnpm
        if: steps.changesets.outputs.has_changesets == 'true'
        uses: pnpm/action-setup@v6
        with:
          version: 9.6.0

      - name: Setup Node
        if: steps.changesets.outputs.has_changesets == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build packages and docs
        if: steps.changesets.outputs.has_changesets == 'true'
        run: pnpm run build

      - name: Version or publish packages
        if: steps.changesets.outputs.has_changesets == 'true'
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release
        if: steps.changesets.outputs.has_changesets != 'true'
        run: echo "No pending changeset markdown files found. Skipping release steps."
